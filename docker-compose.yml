version: '3.8'

services:
  companyhub_nginx:
    image: nginx:alpine
    container_name: companyhub_nginx_prod
    ports:
      - "3001:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - companyhub_frontend
      - companyhub_backend
    restart: unless-stopped

  companyhub_backend:
    build: ./backend
    container_name: companyhub_backend_prod
    expose:
      - "8000"
    environment:
      - DATABASE_URL=sqlite:///./data/companyhub.db
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-123}
      - TZ=Asia/Shanghai
    volumes:
      - /data/companyhub/db:/app/data
      - /data/companyhub/uploads:/app/uploads
    restart: unless-stopped

  companyhub_frontend:
    build: 
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=/api
    container_name: companyhub_frontend_prod
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - TZ=Asia/Shanghai
    depends_on:
      - companyhub_backend
    restart: unless-stopped