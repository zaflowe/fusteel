server {
    listen 80;
    server_name localhost;

    # 全局放宽上传体积，给批量上传 PDF / ZIP 下载留足空间
    client_max_body_size 500M;

    # 前端页面请求
    location / {
        proxy_pass http://companyhub_frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 后端 API 请求
    location /api/ {
        proxy_pass http://companyhub_backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 500M;

        # 批量 PDF 解析 / ZIP 打包都可能耗时较长，放宽超时
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;

        # 关闭响应缓冲，避免大 ZIP 被 nginx 整体缓存到磁盘；同时尊重后端发来的 X-Accel-Buffering: no
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # 上传文件访问
    location /uploads/ {
        proxy_pass http://companyhub_backend:8000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        client_max_body_size 500M;
        proxy_read_timeout 600s;
    }
}